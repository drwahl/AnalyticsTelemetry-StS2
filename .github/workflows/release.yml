name: Release

# Publishes a source zip + runs tests. Binary mod zips must be built locally (game + BaseLib); see README.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Unit tests
        run: dotnet test tests/AnalyticsTelemetry.UnitTests/AnalyticsTelemetry.UnitTests.csproj -c Release

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="AnalyticsTelemetry-${VERSION}/" \
            -o "AnalyticsTelemetry-${VERSION}-source.zip" HEAD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AnalyticsTelemetry-*-source.zip
          generate_release_notes: true
