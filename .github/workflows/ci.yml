name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Run unit tests
        run: dotnet test tests/AnalyticsTelemetry.UnitTests/AnalyticsTelemetry.UnitTests.csproj -c Release
